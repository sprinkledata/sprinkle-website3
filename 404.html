<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – Sprinkle</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .not-found__code {
      font-size: 120px;
      font-weight: 900;
      letter-spacing: -6px;
      line-height: 1;
      background: linear-gradient(135deg, #6D28D9 0%, #06B6D4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .not-found__title { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    .not-found__desc  { font-size: 16px; color: #94A3B8; margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found__code">404</div>
    <h1 class="not-found__title">Page not found</h1>
    <p class="not-found__desc">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn--primary">← Back to Home</a>
  </div>
</body>
</html>
